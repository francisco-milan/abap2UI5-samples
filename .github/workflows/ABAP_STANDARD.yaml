name: ABAP_STANDARD

on:
  pull_request:
  
permissions:
  contents: read

jobs:
  ABAP_STANDARD:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v5
      with:
        node-version: 20
    - run: npm ci
    - run: npx abaplint ./abaplint.jsonc
