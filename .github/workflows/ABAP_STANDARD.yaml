name: ABAP_STANDARD

on:
  pull_request:
  
permissions:
  contents: read

concurrency:
  group: ABAP_STANDARD-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ABAP_STANDARD:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-node@v6
      with:
        node-version: '22'
        cache: 'npm'
    - run: npm ci
    - run: npx abaplint ./abaplint.jsonc
