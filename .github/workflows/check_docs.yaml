name: check_docs

on:
  pull_request:
  push:
    branches: [standard]

permissions:
  contents: read

concurrency:
  group: check_docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  agents_structure:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-node@v6
      with:
        node-version: '22'
    - run: node scripts/check-agents-structure.js
