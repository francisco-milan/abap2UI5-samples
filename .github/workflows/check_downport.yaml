name: check_downport

on:
  pull_request:

jobs:
  auto_downport:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v5

    - name: Set up Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '16'

    - run: npm ci
    - run: rm -rf src/00
    - run: npm run downport
