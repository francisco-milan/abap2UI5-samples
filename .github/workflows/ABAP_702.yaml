name: ABAP_702

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ABAP_702-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ABAP_702:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-node@v6
      with:
        node-version: '22'
        cache: 'npm'
    - run: npm ci
    - run: npm run downport
    - run: npx abaplint .github/abaplint/abap_702.jsonc
