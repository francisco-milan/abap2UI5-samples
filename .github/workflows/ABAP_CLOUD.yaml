name: ABAP_CLOUD

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ABAP_CLOUD-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ABAP_CLOUD:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-node@v6
      with:
        node-version: '22'
        cache: 'npm'
    - run: npm ci
    - run: rm -r src/00
    - run: npx abaplint .github/abaplint/abap_cloud.jsonc
